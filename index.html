<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <title>AI Poem Generator</title>
  </head>
  <body>
    <header>
      <h1>Welcome to the Poem Generator</h1>
    </header>
    <main>
      <form>
        <input
          type="text"
          placeholder="Enter topic of poem"
          autofocus
          required
          autocomplete="off"
        />
        <input type="submit" />
      </form>
      <div>POEM HERE</div>
    </main>
    <footer>
      This project was coded by
      <a href="https://github.com/mennabevan" target="_blank">Menna Bevan</a>
      and is open-sourced on
      <a href="https://ai-poem-app.netlify.app/" target="_blank">Netlify</a>
      and is hosted on
      <a href="https://ai-poems-generator--mennahaf.replit.app" target="_blank"
        >Replit</a
      >
    </footer>
    <script src="src/javascript.js"></script>
  </body>
</html>
